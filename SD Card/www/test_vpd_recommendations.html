<html><head><link rel=stylesheet type=text/css href=style.css><script src=chart.js></script></head>
<body>
	<div id=wrapper>
		<card>
			<container>Perfil: <input type=range class=slider id=profilesel min=0 max=2 step=1 value=0 oninput=SetSelectedProfile()> <ind id=ind_profile></ind></container>
			<container>Rango de Temperatura: <wheelcontainer><div class=wheel id=t0></div></wheelcontainer>~<wheelcontainer><div class=wheel id=t1></div></wheelcontainer></container>
			<container>Rango de Humedad: <wheelcontainer><div class=wheel id=h0></div></wheelcontainer>~<wheelcontainer><div class=wheel id=h1></div></wheelcontainer></container>
			<container>Rango de DPV: <wheelcontainer><div class=wheel id=vpd0></div></wheelcontainer>~<wheelcontainer><div class=wheel id=vpd1></div></wheelcontainer></container>
			<container>Prioridad: <input type=range class=slider id=priority min=0 max=1 step=1 value=0 oninput=UpdateVPDCorrectorPriority()> <ind id=ind_priority></ind></container>
		</card>
		<card>
			<ct>Temperatura Ambiente</ct>
			<canvas id=meter_temp></canvas>
		</card>
		<card>
			Humedad Ambiente
			<canvas id=meter_hum></canvas>
		</card>
		<card>
			Déficit de Presión de Vapor
			<canvas id=meter_vpd></canvas>
			<div class=state id=ind_vpd></div>
		</card>
		<card_header>
			Acción tomada
			<div class=state id=ind_lastaction></div>
		</card_header>
	</div>
</body>
	<script>
		function GetElement(n){return document.getElementById(n);}

		let rc=['#EC6066','#6699CC','#99C794','#F9AE58'];

		let vpdranges=[
			{min:0,max:.3,c:rc[0],s:'Peligro, Muy Húmedo'},
			{min:.3,max:.6,c:rc[1],s:'Propagación'},
			{min:.6,max:1.0,c:rc[2],s:'Vegetativo'},
			{min:1.0,max:1.6,c:rc[3],s:'Floración'},
			{min:1.6,max:6.27,c:rc[0],s:'Peligro, Muy Seco'}
		];

		let tempranges=[
			{min:0,max:18,c:rc[1]},
			{min:18,max:26,c:rc[2]},
			{min:26,max:30,c:rc[3]},
			{min:30,max:60,c:rc[0]}
		];

		let humranges=[
			{min:0,max:40,c:rc[0]},
			{min:40,max:50,c:rc[1]},
			{min:50,max:70,c:rc[2]},
			{min:70,max:85,c:rc[3]},
			{min:85,max:100,c:rc[0]}
		];

		let recommends=['▲ Humedad.','▼ Humedad.','▲ Temperatura.','▼ Temperatura.','Óptimo.','This could get ugly'];
		///////////////////////
		let elements=['t0','t1','h0','h1','vpd0','vpd1'];

		function GetElement(n){return document.getElementById(n);}

		function SetWheelSpinRange(e,min,max,step=1){
			e=GetElement(e);
			e.min=min;
			e.step=step;

			for(i=min;i<=max+Number.EPSILON;i=Math.round((i+step)*1000)/1000){
				let l=document.createElement('div');
				l.className='wheellabel';
				l.textContent=i;
				e.appendChild(l);
			}
		}

		function SetWheelSpinValue(e,v){
			e=GetElement(e);
			e.scrollTop=Math.round((v-e.min)/e.step)*15;
		}

		function GetWheelValue(e){return parseFloat(e.children[Math.round(e.scrollTop/15)].textContent);}
		////////////////////////////////////////////////
		SetWheelSpinRange('t0',0,100);
		SetWheelSpinRange('t1',0,100);

		SetWheelSpinRange('h0',0,100);
		SetWheelSpinRange('h1',0,100);

		SetWheelSpinRange('vpd0',0,7,.1);
		SetWheelSpinRange('vpd1',0,7,.1);

		SetWheelSpinValue('t0',18);
		SetWheelSpinValue('t1',30);

		SetWheelSpinValue('h0',40);
		SetWheelSpinValue('h1',70);

		SetWheelSpinValue('vpd0',.6);
		SetWheelSpinValue('vpd1',1);

		elements.forEach((e,index)=>{
			e=GetElement(e);
			e.addEventListener('wheel',ev=>{
				ev.preventDefault();
				e.scrollBy({top:Math.sign(ev.deltaY)*15});
			});
		});
		//////////////////////////////////////////////////////////
		let e_prosel=GetElement('profilesel'),e_priority=GetElement('priority'),e_fim=GetElement('fim');

		function GetElement(n){return document.getElementById(n);}
		function CalcBright(v){return`Aprox: ${(Math.round(v/MaxLightBright*100)/100*1008).toFixed(0)}ppfd`;}

		function SetSelectedProfile(s){
			let v=parseInt(e_prosel.value);
			GetElement('ind_profile').innerText=v==0?'Vegetativo':v==1?'Floración':'Secado';

			if(v>1)
				return;

			v=v+2;

			SetWheelSpinValue('t0',tempranges[v-1].min);
			SetWheelSpinValue('t1',tempranges[v-1].max);

			SetWheelSpinValue('h0',humranges[v].min);
			SetWheelSpinValue('h1',humranges[v].max);

			SetWheelSpinValue('vpd0',vpdranges[v].min);
			SetWheelSpinValue('vpd1',vpdranges[v].max);
		}

		SetSelectedProfile();

		function UpdateVPDCorrectorPriority(){
			let v=parseInt(e_priority.value);
			GetElement('ind_priority').innerText=v==0?'Humedad':'Temperatura';
		}
		UpdateVPDCorrectorPriority();

		function SetFertsIncorporationMode(s){
			let v=parseInt(e_fim.value);

			GetElement('ind_fim').innerText=v==0?'Permisivo':'Estricto';

			CalcFertsIncorporation();
		}

		function CalcVPD(t,h){
			t=parseInt(t),h=parseInt(h);
			let e=6.112*Math.exp((17.67*t)/(243.5+t)),r=(e-(h/100)*e)/10;
			return r;
		}


		function GetVPDRecommendation(t,h,vpd){
			let recomendations=[],priority=parseInt(e_priority.value);
			let tmin=GetWheelValue(GetElement('t0')),tmax=GetWheelValue(GetElement('t1'));
			let hmin=GetWheelValue(GetElement('h0')),hmax=GetWheelValue(GetElement('h1'));
			let vpdmin=GetWheelValue(GetElement('vpd0')),vpdmax=GetWheelValue(GetElement('vpd1'));

			if(h<hmin)
				recomendations.push({r:recommends[0],p:0});
			else if(h>hmax)
				recomendations.push({r:recommends[1],p:0});

			if(t<tmin)
				recomendations.push({r:recommends[2],p:1});
			else if(t>tmax)
				recomendations.push({r:recommends[3],p:1});

			if(recomendations.length==0){
				if(vpd>=vpdmin&&vpd<=vpdmax)
					return recommends[4];
			}else{
				recomendations.sort((x,y)=>{
					return Math.abs(x.p-priority)-Math.abs(y.p-priority);
				});

				return recomendations[0].r;
			}

			let ideal_vpd=(vpdmin+vpdmax)/2,vpd_diff=Math.abs(vpd-ideal_vpd),vpd_delta=Math.max(1,vpd_diff);

			[
				{t:t,h:h+vpd_delta,c:h+vpd_delta<=hmax,p:0},
				{t:t,h:h-vpd_delta,c:h-vpd_delta>=hmin,p:0},
				{t:t+vpd_delta,h:h,c:t+vpd_delta<=tmax,p:1},
				{t:t-vpd_delta,h:h,c:t-vpd_delta>=tmin,p:1}
			].forEach(({t,h,c,p},i)=>{
				if(!c)
					return;

				let vpd=CalcVPD(t,h);

				if(vpd>=vpdranges[0].min&&vpd<=vpdranges[4].max)
					recomendations.push({r:recommends[i],s:vpd,p});
			});

			recomendations.sort((a,b)=>{
				let sa=Math.abs(a.s-ideal_vpd),sb=Math.abs(b.s-ideal_vpd);

				if(a.p==priority)
					sa-=.5;

				if(b.p==priority)
					sb-=.5;

				return sa-sb;
			});

			if(recomendations.length>0)
				return recomendations[0].r;

			recommends[5];
		}
		////////////////////////////
		function GetStateOfVPD(v){
			if(v<=vpdranges[4].max){
				for(let i=0;i<vpdranges.length;i++){
					let r=vpdranges[i],il=i==vpdranges.length-1;

					if(v>=r.min&&(il?v<=r.max:v<r.max))
						return vpdranges[i].s;
				}
			}

			return'Fuera de rango';
		}
		////////////////////////////
		function SemiCircleGauge(e,ranges,p,...t){
			e=GetElement(e);
			e.height=70;
			e.width=160;

			p=parseFloat(p);

			let h=e.height-4,ctx=e.getContext('2d'),cx=e.width/2,apr=Math.PI/ranges.length,sa=Math.PI,a=Math.PI,pw=.06,ty=h;

			for(let i=0;i<ranges.length;i++){
				let ea=sa+apr;

				ctx.beginPath();
				ctx.arc(cx,h,h-8,sa,ea,false);
				ctx.strokeStyle=ranges[i].c;
				ctx.lineWidth=11;
				ctx.stroke();

				sa=ea;
			}

			if(p>=ranges[ranges.length-1].max){
				a=2*Math.PI;
			}else{
				for(let i=0;i<ranges.length;i++){
					let r=ranges[i];

					if(p>=r.min&&p<=r.max){
						a+=(i+(p-r.min)/(r.max-r.min))*apr;
						break;
					}
				}
			}

			ctx.beginPath();
			ctx.arc(cx,h,h-16,a-pw,a+pw);
			ctx.arc(cx,h,h,a+pw,a-pw,true);
			ctx.closePath();
			ctx.fillStyle='#2A8387';
			ctx.fill();

			ctx.fillStyle='#D8DEE9';
			ctx.textAlign='center';
			ctx.textBaseline='middle';

			if(e.id=='meter_vpd'){
				ctx.font='14px Arial';

				ty-=17;

				p=p.toFixed(2);
			}else{
				ctx.font='16px Arial';

				p=p.toFixed(1);
			}

			ctx.fillText(p+t[0],cx,ty-4);

			if(t[1])
				ctx.fillText(t[1],cx,ty+10);
		}

		function SetEnvValues(t,h){
			let vpd=CalcVPD(t,h);

			SemiCircleGauge('meter_temp',tempranges,t,'°C');
			SemiCircleGauge('meter_hum',humranges,h,'%');
			SemiCircleGauge('meter_vpd',vpdranges,vpd,'kPa',GetStateOfVPD(vpd));
			GetElement('ind_vpd').innerText=GetVPDRecommendation(t,h,vpd);
		}

		// TODO: Acá hay que crear una función que sea la que toma las decisiones. Consultando a GetVPDRecommendation, ejecutando la recomendación. Y esperando un periodo de tiempo antes de volver a consultarle a GetVPDRecommendation
		function ExecuteCorrections(t,h){
			let vpd=CalcVPD(t,h),r=GetVPDRecommendation(t,h,vpd);

			ind_lastaction.innerText=r;
		}
		//////////////////////////////////////////////////////////////////////////////////////////
		function randomFloat(min, max) {return Math.random() * (max - min) + min;}

		let t,h;

t=25.5,h=60.2;
			SetEnvValues(t,h);

		setInterval(()=>{
			//t=randomFloat(15,40),h=randomFloat(30,80);
			SetEnvValues(t,h);

			// o
			//location.reload();
		},500);

		setInterval(() => {
			ExecuteCorrections(t,h);
		},
		1000 
		//5 * 60 * 1000	// 5 minutos
			);
	</script>
</html>
