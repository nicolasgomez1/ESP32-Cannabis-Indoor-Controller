		<link rel=stylesheet type=text/css href=style.css>
		<style>
			select{background-color:#181818;border:1px solid#2A8387;border-radius:3px;color:#D8DEE9;padding:2;outline:none;cursor:pointer}

			#binnacle{border-collapse:collapse;width:100%}
			#binnacle thead{background-color:#2A2F34;width-min:1000px}
			#binnacle td{border:1px solid#2A2F34}
			#binnacle tbody tr:hover{background-color:rgba(26,29,33,.4)}

			.dcr{background:transparent;border:none;outline:none;color:#D8DEE9;text-align:center;align-content:center;resize:none;overflow:hidden;width:100%}

			.md{width:1%}

			.dt{width:100%;background:transparent;border:none;text-align:center;outline:none}

			.btn{all:unset;cursor:pointer;font-size:12}

			.menu{padding:5 10;cursor:pointer;color:#D8DEE9;font-size:13}
			.menu:hover{background:rgba(255,255,255,.1)}

			.sm{outline:1px solid#2A8387}

	<body>
		<div id=cm style='display:none;position:absolute;background:#2A2F34;border:1px solid#444;z-index:999;padding:4 0'>
			<div class=menu id=menuMerge style=display:none onclick=TryMerge()>⬌ Combinar Celdas</div>
			<div class=menu id=menuSplit style=display:none onclick=TrySplit()>⬌ Separar Celdas</div>
			<div class=menu onclick=AddNewStrain()>➕ Añadir Genética</div>
			<div class=menu onclick=AddNewRow()>➕ Añadir Fila</div>
			<div class=menu id=menuColor onclick=GetElement('cp').click()>🎨 Color de Fondo</div>
		</div>
		<input type=color id=cp style=display:none>

			<card_header>
				<ct>Bitácora de Cultivo</ct><br>
				<container>
					<select id=binnacles>
						<option>Runtz 2025</option>
						<option>Afghan 2024</option>
						<option>Afghan 2023</option>
						<option>Dry</option>
					</select>
					<button onlclick=CreateNewBinnacle()>Crear nueva Bitácora</button> <button onlclick=DeleteBinnacle()>Borrar Bitácora</button>
				</container>
				<container>
					<table id=binnacle>
						<thead>
							<tr>
								<th class=md>Acciones</th>
								<th class=md>Fecha</th>
							</tr>
						</thead>
						<tbody>
						</tbody>
					</table>
				</container>&nbsp;
			</card_header>
		</div>

	<script>
		let OldDate='',SendTimeOut=null,ContextMenuTarget=null,SelectedCells=[];

		function GetElement(n){return document.getElementById(n)}

		function SerializeBinnacle(){
			let strainHeaders=[...document.querySelectorAll('#binnacle thead th')].slice(2).map(th=>th.querySelector('n').innerText),lines=[];

			document.querySelectorAll('#binnacle tbody tr').forEach(tr=>{
				let si=0;

				[...tr.querySelectorAll('td')].slice(2).forEach(td=>{
					let note=td.querySelector('textarea')?.value.replaceAll('\n','↵')||'',span=parseInt(td.getAttribute('colspan'))||1,color=td.color;
					lines.push(`${strainHeaders[si]}|${new Date(tr.querySelector('input[type=date]').value).getTime()/1000}|${note}${span>1||color?'|'+span:''}${color?'|'+color:''}`);
					si+=span;
				});
			});
			//return lines.join('\n');
			console.log(lines.join('\n'));
		}

		function Send(){
			clearTimeout(SendTimeOut);
			SendTimeOut=setTimeout(()=>{
				SerializeBinnacle();
				// TODO: ...
			},1000);
		}

		function SetupLongPress(ta){
			let t;

			ta.addEventListener('touchstart',e=>{t=setTimeout(()=>{
				let touch=e.touches[0];
				ContextMenuTarget=ta;

				GetElement('menuMerge').style.display=SelectedCells.length>=2?'block':'none';
				GetElement('menuSplit').style.display=ta.closest('td')?.colSpan>1?'block':'none';
				GetElement('menuColor').style.display=ta.closest('th')?'none':'block';

				let m=GetElement('cm');
				m.style.display='block';
				m.style.left=touch.pageX;
				m.style.top=touch.pageY;
			},600)});
			ta.addEventListener('touchend',()=>clearTimeout(t));
			ta.addEventListener('touchmove',()=>clearTimeout(t));
		}

		function CreateNewBinnacle(){
			// TODO: ...
		}

		function DeleteBinnacle(){
			// TODO: ...
		}

		function AddNewStrain(){
			let ns=prompt('Nombre de la Genética','');
			if(ns!=null&&ns.trim()!=''){
				let thead=document.querySelector('#binnacle thead tr'),th=document.createElement('th');

				th.innerHTML=`<n onclick=EditStrainName(this)>${ns.trim()}</n><div style=float:right><button class=btn title='Borrar Genética' onclick=DeleteStrain(this)>❌</button></div>`;
				thead.appendChild(th);

				document.querySelectorAll('#binnacle tbody tr').forEach(r=>{
					let td=document.createElement('td'),ta=document.createElement('textarea');
					ta.className='dcr';
					ta.setAttribute('oninput','EditColumn(this,true)');

					SetupLongPress(ta);

					td.appendChild(ta);
					r.appendChild(td);
				});

				Send();
			}
		}

		function AddNewRow(){
			let tbody=document.querySelector('#binnacle tbody'),StrainCount=document.querySelectorAll('#binnacle thead tr th').length-2,tr=document.createElement('tr');

			let tdActions=document.createElement('td');
			tdActions.innerHTML=`<button class=btn title='Borrar Fila' onclick=DeleteRow(this)>❌</button><button class=btn title='Copiar Fila' onclick=CopyRow(this)>📑</button>`;
			tr.appendChild(tdActions);

			let tdDate=document.createElement('td'),input=document.createElement('input');
			input.className='dt';
			input.type='date';
			input.value=new Date().toISOString().split('T')[0];
			input.setAttribute('onclick','SetOldDate(this)');
			input.setAttribute('onchange','SetNewDate(this)');
			tdDate.appendChild(input);
			tr.appendChild(tdDate);

			for(let i=0;i<StrainCount;i++){
				let td=document.createElement('td'),ta=document.createElement('textarea');
				ta.className='dcr';
				ta.setAttribute('oninput','EditColumn(this,true)');

				SetupLongPress(ta);

				td.appendChild(ta);
				tr.appendChild(td);
			}

			tbody.appendChild(tr);

			Send();
		}

		function ComposeBinnacle(data){
			data=data.trim().split('\n').map(l=>l.trim().split('|')),strains=[...new Set(data.map(([s])=>s))],timestamps=[...new Set(data.map(([,ts])=>ts))].sort((a,b)=>a-b);

			document.querySelector('#binnacle thead tr').querySelectorAll('th:not(.md)').forEach(th=>th.remove());
			document.querySelector('#binnacle tbody').innerHTML='';

			strains.forEach(s=>{
				let th=document.createElement('th');
				th.innerHTML=`<n onclick=EditStrainName(this)>${s}</n><div style=float:right><button class=btn title='Borrar Genética' onclick=DeleteStrain(this)>❌</button></div>`;
				document.querySelector('#binnacle thead tr').appendChild(th);
			});

			timestamps.forEach(ts=>{
				let tr=document.createElement('tr'),tdA=document.createElement('td');
				tdA.innerHTML=`<button class=btn title='Borrar Fila' onclick=DeleteRow(this)>❌</button> <button class=btn title='Copiar Fila' onclick=CopyRow(this)>📑</button>`;
				tr.appendChild(tdA);

				let tdF=document.createElement('td'),input=document.createElement('input');
				input.className='dt';
				input.type='date';

				let d=new Date(ts*1000),skip=0;

				input.value=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
				input.setAttribute('onclick','SetOldDate(this)');
				input.setAttribute('onchange','SetNewDate(this)');
				tdF.appendChild(input);
				tr.appendChild(tdF);

				strains.forEach((s,i)=>{
					if(skip>0){
						skip--;
						return;
					}

					let match=data.find(([ds,dts])=>ds==s&&dts==ts),td=document.createElement('td'),ta=document.createElement('textarea'),span=parseInt(match?.[3])||1,color=match?.[4];;
					
					if(span>1){
						td.setAttribute('colspan',span);
						skip=span-1;
					}

					if(color){
						td.style.backgroundColor=color;
						td.color=color;
					}

					ta.className='dcr';
					ta.setAttribute('oninput','EditColumn(this,true)');
					ta.value=data.filter(([ds,dts])=>ds==s&&dts==ts).map(([,,note])=>note).join(' / ').replaceAll('↵','\n')||'';

					SetupLongPress(ta);

					td.appendChild(ta);
					tr.appendChild(td);
				});

				document.querySelector('#binnacle tbody').appendChild(tr);
			});

			document.querySelectorAll('#binnacle tbody tr').forEach(r=>{
				let f=r.querySelector('textarea');
				if(f)
					EditColumn(f);
			});
		}

		function EditStrainName(e){
			let nsn=prompt('Nuevo Nombre',e.innerText);
			if(nsn!=null&&nsn.trim()!=''){
				e.innerText=nsn;
				Send();
			}
		}

		function DeleteStrain(e){
			if(confirm('¿Seguro que queres eliminar esta Columna?')){
				let idx=e.closest('th').cellIndex,d=false;

				document.querySelectorAll('#binnacle tr').forEach(r=>{
					if(r.cells[idx]){
						r.cells[idx].remove();
						d=true;
					}
				});

				if(d)
					Send();
			}
		}

		function DeleteRow(e){
			if(confirm('¿Seguro que queres eliminar esta Fila?')){
				e.closest('tr').remove();
				Send();
			}
		}

		function CopyRow(e){
			let tr=e.closest('tr'),clone=tr.cloneNode(true);

			tr.insertAdjacentElement('afterend',clone);

			EditColumn(clone.querySelector('textarea'),true);
		}

		function SetOldDate(e){OldDate=e.value}

		function SetNewDate(e){
			if(!e.value){
				e.value=OldDate;
				return;
			}

			Send();
		}

		function EditColumn(e,s){
			let tas=e.closest('tr').querySelectorAll('textarea'),mh=0;

			tas.forEach(e=>e.style.height='auto');
			tas.forEach(e=>{mh=Math.max(mh,e.scrollHeight)});
			tas.forEach(e=>e.style.height=mh);

			if(s)
				Send();
		}

		document.addEventListener('click',()=>{GetElement('cm').style.display='none'});

		function ClearSelection(){
			SelectedCells.forEach(td=>td.classList.remove('sm'));
			SelectedCells=[];
		}

		function TryMerge(){
			let r=new Set(SelectedCells.map(td=>td.closest('tr')));
			if(r.size>1){
				alert('Solo se pueden unir celdas de la misma fila.');
				ClearSelection();
				return;
			}

			SelectedCells.sort((a,b)=>a.cellIndex-b.cellIndex);

			for (let i=1;i<SelectedCells.length;i++){
				if(SelectedCells[i].cellIndex!=SelectedCells[i-1].cellIndex+1){
					alert('Las celdas tienen que ser contiguas.');
					ClearSelection();
					return;
				}
			}

			if(!confirm(`Se van a unir ${SelectedCells.length} celdas.\nSe va a mantener solo: '${SelectedCells[0].querySelector('textarea')?.value||'(vacía)'}'\n¿Continuar?`)){
				ClearSelection();
				return;
			}

			SelectedCells[0].setAttribute('colspan',SelectedCells.length);

			for(let i=1;i<SelectedCells.length;i++)
				SelectedCells[i].remove();

			ClearSelection();

			Send();
		}

		function TrySplit(){
			let td=ContextMenuTarget.closest('td');
			if(!td||td.colSpan<2)
				return;

			let span=td.colSpan,tr=td.closest('tr');
			td.removeAttribute('colspan');

			for (let i=1;i<span;i++){
				let newTD=document.createElement('td'),ta=document.createElement('textarea');
				ta.className='dcr';
				ta.setAttribute('oninput','EditColumn(this,true)');

				SetupLongPress(ta);

				newTD.appendChild(ta);
				td.insertAdjacentElement('afterend',newTD);
			}

			Send();
		}

		GetElement('cp').addEventListener('input',e=>{
			if(ContextMenuTarget){
				ContextMenuTarget.style.backgroundColor=e.target.value;
				Send();
			}
		});

		document.querySelector('#binnacle').addEventListener('pointerdown',e=>{
			if(e.button==2)
				return;

			if(!e.ctrlKey){
				ClearSelection();
				return;
			}

			let td=e.target.closest('td');
			if(!td||td.cellIndex<2||!td.closest('tbody'))
				return;

			e.preventDefault();

			if(SelectedCells.includes(td)){
				td.classList.remove('sm');
				SelectedCells=SelectedCells.filter(c=>c!=td);
			}else{
				td.classList.add('sm');
				SelectedCells.push(td);
			}
		});

		document.querySelector('#binnacle').addEventListener('contextmenu',e=>{
			e.preventDefault();

			ContextMenuTarget=e.target.closest('textarea');

			GetElement('menuMerge').style.display=SelectedCells.length>=2?'block':'none';
			GetElement('menuSplit').style.display=e.target.closest('td')?.colSpan>1?'block':'none';
			GetElement('menuColor').style.display=e.target.closest('th')?'none':'block';

			let m=GetElement('cm');
			m.style.display='block';
			m.style.left=e.pageX;
			m.style.top=e.pageY;
		});

		window.addEventListener('load',()=>{
			document.querySelectorAll('tbody tr').forEach(r=>{
				let f=r.querySelector('textarea');
				if(f)
					EditColumn(f);
			});
