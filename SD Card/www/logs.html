<html>
	<head>
		<!-- Version V420260315_070549 -->
		<meta name=viewport content=width=device-width,initial-scale=1.0>
		<meta charset=utf-8>
		<link rel=icon href=data:,>
		<link rel='shortcut icon'href=data:,>
		<title>ESP32 Indoor Logs & Metrics</title>
		<link rel=stylesheet type=text/css href=style.css>
		<style>a{color:inherit;text-decoration:underline}</style>
	</head>
	<body>
		<div id=wrapper>
			<card>
				<ct>Logs/Metrics</ct>
				<div style=display:flex>
					<ul id=logslist></ul>
					<ul id=metricslist></ul>
				</div>
			</card>
		</div>
		<script>
			fetch('/?action=list&logs').then(r=>r.text()).then(t=>{
				let e=document.getElementById('logslist'),f=t.split(':'),d=new Date(),p=n=>n.toString().padStart(2,'0'),today=`logging_${p(d.getDate())}_${p(d.getMonth()+1)}_${d.getFullYear()}.txt`;

				const parseDate=n=>{let m=n.match(/(\d+)_(\d+)_(\d+)/);return m?new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1])):new Date(0);};

				f.sort((a,b)=>parseDate(b)-parseDate(a)).forEach(n=>{
					let i=document.createElement('li'),l=document.createElement('a');
					l.href='../logs/'+n+(n==today?'#'+Date.now():'');
					l.textContent=n;
					l.target='_blank';
					i.appendChild(l);
					e.appendChild(i);
				});
			});

			fetch('/?action=list&metrics').then(r=>r.text()).then(t=>{
				let e=document.getElementById('metricslist'),f=t.split(':'),d=new Date(),p=n=>n.toString().padStart(2,'0'),today=`metrics_${p(d.getMonth()+1)}_${d.getFullYear()}.txt`;

				const parseDate=n=>{let m=n.match(/(\d+)_(\d+)/);return m?new Date(parseInt(m[2]),parseInt(m[1])-1):new Date(0);};

				f.sort((a,b)=>parseDate(b)-parseDate(a)).forEach(n=>{
					let i=document.createElement('li'),l=document.createElement('a');
					l.href='../metrics/'+n+(n==today?'#'+Date.now():'');
					l.textContent=n;
					l.target='_blank';
					i.appendChild(l);
					e.appendChild(i);
				});
			});
		</script>
	</body>
</html>
